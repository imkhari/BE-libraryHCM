spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tutuongHCM}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:4869}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true